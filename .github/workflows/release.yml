name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MODULE="github.com/syu6noob/devsync"
          LDFLAGS="-s -w -X ${MODULE}/internal/core.Version=${VERSION} -X ${MODULE}/internal/core.Commit=${COMMIT} -X ${MODULE}/internal/core.Date=${DATE}"
          mkdir -p dist/devsync-${GOOS}-${GOARCH}
          go build -trimpath -ldflags "$LDFLAGS" -o dist/devsync-${GOOS}-${GOARCH}/devsync${{ matrix.ext }} ./cmd/devsync
          go build -trimpath -ldflags "$LDFLAGS" -o dist/devsync-${GOOS}-${GOARCH}/devsync-server${{ matrix.ext }} ./cmd/devsync-server
          cp README.md dist/devsync-${GOOS}-${GOARCH}/
          cp examples/.devsyncignore dist/devsync-${GOOS}-${GOARCH}/devsyncignore.example

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf devsync-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz devsync-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Package zip
        if: matrix.archive == 'zip'
        run: |
          cd dist
          zip -r devsync-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip devsync-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devsync-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --title "${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}"
