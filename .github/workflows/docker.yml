name: Docker

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build server Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t ghcr.io/syu6noob/devsync-server:${{ github.sha }} .

      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag ghcr.io/syu6noob/devsync-server:${{ github.sha }} ghcr.io/syu6noob/devsync-server:${{ github.ref_name }}
          docker tag ghcr.io/syu6noob/devsync-server:${{ github.sha }} ghcr.io/syu6noob/devsync-server:latest
          docker push ghcr.io/syu6noob/devsync-server:${{ github.ref_name }}
          docker push ghcr.io/syu6noob/devsync-server:latest
